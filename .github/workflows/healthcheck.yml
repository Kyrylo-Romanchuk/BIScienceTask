name: AI Chatbot Healthcheck

# Recurring smoke check for the "Ask anything..." AI Chatbot feature.
#
# Runs on a schedule (adjust the cron below to fit the desired frequency), on demand via
# workflow_dispatch (pick the target environment), and on pushes that touch the suite
# itself so a broken healthcheck is caught immediately rather than at the next scheduled run.
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to run against (matches src/main/resources/config/<name>.properties)"
        type: choice
        default: staging
        options:
          - staging
  push:
    branches: [main]
    paths:
      - "src/**"
      - "pom.xml"
      - "testng.xml"
      - ".github/workflows/healthcheck.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  healthcheck:
    name: Chatbot healthcheck (${{ github.event.inputs.environment || 'staging' }})
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Install Playwright browser (Chromium)
        run: |
          mvn -B -q test-compile
          mvn -B -q org.codehaus.mojo:exec-maven-plugin:3.1.0:java \
            -Dexec.mainClass=com.microsoft.playwright.CLI \
            -Dexec.classpathScope=test \
            -Dexec.args="install --with-deps chromium"

      - name: Run healthcheck suite
        env:
          HEALTHCHECK_USER_EMAIL: ${{ secrets.HEALTHCHECK_USER_EMAIL }}
          HEALTHCHECK_USER_PASSWORD: ${{ secrets.HEALTHCHECK_USER_PASSWORD }}
        run: mvn -B test -Denv=${{ github.event.inputs.environment || 'staging' }}

      - name: Generate Allure report
        if: always()
        run: mvn -B -q allure:report

      - name: Upload test report and screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: healthcheck-report
          path: |
            target/site/allure-maven-plugin/
            target/surefire-reports/
            screenshots/
          retention-days: 14
          if-no-files-found: ignore

      - name: Notify on failure
        if: failure() && env.HEALTHCHECK_WEBHOOK_URL != ''
        env:
          HEALTHCHECK_WEBHOOK_URL: ${{ secrets.HEALTHCHECK_WEBHOOK_URL }}
        run: |
          curl -sf -X POST "$HEALTHCHECK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"AI Chatbot healthcheck failed on ${{ github.event.inputs.environment || 'staging' }}: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
